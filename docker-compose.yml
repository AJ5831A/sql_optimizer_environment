# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
#
# Spins up:
#   postgres — custom DB with pg_hint_plan extension pre-loaded
#   env      — sql_optimizer OpenEnv server
#
# Usage:
#   docker-compose down -v  <-- RUN THIS ONCE to clear the old database!
#   docker-compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: sql_optimizer_db
    # Force Postgres to load the hint plan extension into shared memory
    command: ["postgres", "-c", "shared_preload_libraries=pg_hint_plan"]
    environment:
      POSTGRES_USER: sqlopt
      POSTGRES_PASSWORD: sqlopt
      POSTGRES_DB: sqlopt
    ports:
      # Host port 5433 → container 5432 (5432 is taken by a native Postgres on this Mac).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # NOTE: 01_init.sql is baked into the image via db.Dockerfile.
      # Bind-mounting a single file on macOS hits a VirtioFS deadlock bug.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqlopt -d sqlopt"]
      interval: 5s
      timeout: 5s
      retries: 10

  env:
    build:
      context: .
      dockerfile: sql_optimizer/server/Dockerfile
    container_name: sql_optimizer_env
    ports:
      - "8000:8000"
    environment:
      WORKERS: "4"
      MAX_STEPS: "10"
      QUERY_TIMEOUT_MS: "30000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: